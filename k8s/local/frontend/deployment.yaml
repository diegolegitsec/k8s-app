apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: k8s-app/frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
