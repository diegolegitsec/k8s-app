apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-gp3
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
# Delays EBS volume creation until a Pod is scheduled so the
# volume is created in the correct AZ. Required for EBS.
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
