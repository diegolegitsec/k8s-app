apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Replace <AWS_ACCOUNT_ID> and <REGION> before deploying
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/k8s-app/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: backend-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
