apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: k8s-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Substituted by deploy.sh from config.env (GITHUB_OWNER, IMAGE_TAG).
          image: ghcr.io/<OWNER>/k8s-app/frontend:<TAG>
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
