apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Replace <AWS_ACCOUNT_ID> and <REGION> before deploying
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/k8s-app/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
