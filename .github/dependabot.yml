version: 2
updates:
  # Keep GitHub Actions pinned to latest commit SHAs automatically
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Keep npm dependencies up to date
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly

  # Keep Docker base images up to date
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
